<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <title>Meu Fluxo de Caixa Inteligente</title>
    <style>
        /* Variáveis de Cores (Suporta Modo Claro e Escuro) */
        :root {
            --bg-body: #f4f6f9;
            --bg-container: white;
            --texto-principal: #222;
            --texto-secundario: #666;
            --borda: #eee;
            --shadow: rgba(0,0,0,0.05);
            --entrada: #2ecc71;
            --saida: #e74c3c;
            --cartao: #f39c12;
            --azul-saldo: #2980b9;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --texto-principal: #f5f6fa;
            --texto-secundario: #aaa;
            --borda: #2d2d2d;
            --shadow: rgba(0,0,0,0.3);
            --azul-saldo: #3498db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-body); color: var(--texto-principal); padding: 15px; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100%; }
        
        /* CABEÇALHO DO APP */
        .app-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px; padding: 5px; }
        .app-title { font-size: 1.4rem; font-weight: 700; color: var(--azul-saldo); letter-spacing: -0.5px; }
        .app-actions { display: flex; gap: 14px; align-items: center; }
        .icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--texto-secundario); display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; }
        .icon-btn:hover { background: var(--borda); }

        /* CARDS NO TOPO (CLICÁVEIS) */
        .cards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .card { background: var(--bg-container); padding: 12px 5px; border-radius: 8px; box-shadow: 0 2px 4px var(--shadow); text-align: center; border: 1px solid var(--borda); cursor: pointer; user-select: none; }
        .card:hover { filter: brightness(0.97); }
        [data-theme="dark"] .card:hover { filter: brightness(1.15); }
        
        .card h3 { font-size: 0.72rem; color: var(--texto-secundario); margin-bottom: 3px; text-transform: uppercase; }
        .card p { font-size: 0.95rem; font-weight: bold; }
        .card.saldo-total { grid-column: span 3; padding: 12px; margin-top: 2px; position: relative;}
        .card.saldo-total p { font-size: 1.3rem; }
        
        .previsao-texto { font-size: 0.75rem; color: var(--texto-secundario); margin-top: 4px; font-weight: 500; }

        .cor-entrada { color: var(--entrada); }
        .cor-saida { color: var(--saida); }
        .cor-cartao { color: var(--cartao); }

        /* CAIXA DE TEXTO */
        .chat-input-area { display: flex; gap: 8px; background: var(--bg-container); padding: 8px 12px; border-radius: 25px; box-shadow: 0 2px 5px var(--shadow); align-items: center; margin-bottom: 15px; position: relative; border: 1px solid var(--borda); }
        .chat-input { flex-grow: 1; border: none; padding: 8px 5px; font-size: 1rem; outline: none; background: transparent; color: var(--texto-principal); }
        .btn-enviar { background: #2c3e50; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        
        /* Alerta flutuante */
        .alerta-temporario { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 6px 15px; border-radius: 15px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; white-space: nowrap; z-index: 10; }
        .alerta-temporario.mostrar { opacity: 1; }

        /* FILTROS */
        .filtros-container { display: flex; gap: 6px; margin-bottom: 10px; }
        .filtro-select { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--borda); background: var(--bg-container); font-size: 0.85rem; color: var(--texto-secundario); outline: none; font-weight: 500; }

        /* LISTA COMPLETA ABAIXO */
        .lista-titulo { font-size: 0.85rem; color: var(--texto-secundario); margin-bottom: 6px; padding-left: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .lista-container { background: var(--bg-container); border-radius: 8px; box-shadow: 0 2px 4px var(--shadow); flex-grow: 1; overflow-y: auto; padding: 5px 10px; margin-bottom: 10px; border: 1px solid var(--borda); }
        
        .item-transacao { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid var(--borda); font-size: 0.95rem; align-items: center; cursor: pointer; }
        .item-transacao:hover { background-color: var(--bg-body); }
        .item-transacao:last-child { border-bottom: none; }
        
        .detalhes-item { display: flex; flex-direction: column; gap: 4px; }
        .descricao-texto { font-weight: 500; color: var(--texto-principal); text-transform: capitalize; }
        
        .tags-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
        .tipo-tag { font-size: 0.62rem; padding: 1px 5px; border-radius: 4px; color: white; font-weight: bold; text-transform: uppercase; }
        .tag-entrada { background: var(--entrada); }
        .tag-saida { background: var(--saida); }
        .tag-cartao { background: var(--cartao); }
        .tag-conta { background: #7f8c8d; color: white; font-size: 0.62rem; padding: 1px 5px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .tag-cartao-especifico { background: #34495e; color: white; font-size: 0.62rem; padding: 1px 5px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }

        /* MODAL DE EDIÇÃO */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-container { background: var(--bg-container); width: 100%; max-width: 400px; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--borda); }
        .modal-title { font-size: 1.1rem; font-weight: bold; color: var(--texto-principal); margin-bottom: 4px; }
        .modal-label { font-size: 0.85rem; font-weight: 600; color: var(--texto-secundario); margin-bottom: -6px; }
        .modal-input, .modal-select { width: 100%; padding: 10px; border: 1px solid var(--borda); border-radius: 6px; font-size: 1rem; outline: none; background: var(--bg-container); color: var(--texto-principal); }
        .modal-botoes { display: flex; gap: 8px; margin-top: 10px; }
        .btn-modal { flex: 1; padding: 10px; border-radius: 6px; font-size: 0.95rem; font-weight: bold; border: none; cursor: pointer; }
        .btn-salvar { background: var(--entrada); color: white; }
        .btn-excluir { background: var(--saida); color: white; }
        .btn-cancelar { background: #bdc3c7; color: #333; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- CABEÇALHO -->
    <div class="app-header">
        <div class="app-title">Meu Saldo</div>
        <div class="app-actions">
            <button class="icon-btn" id="btn-visibilidade" onclick="alternarVisibilidade()" title="Esconder valores">👁️</button>
            <button class="icon-btn" id="btn-tema" onclick="alternarTema()" title="Mudar Tema">🌙</button>
        </div>
    </div>

    <!-- CARDS NO TOPO CLICÁVEIS -->
    <div class="cards-container">
        <div class="card" onclick="filtrarPorCard('entrada')">
            <h3>Entradas</h3>
            <p class="cor-entrada">R$ <span class="valor-dinamico" id="card-entradas" data-valor="0.00">0,00</span></p>
        </div>
        <div class="card" onclick="filtrarPorCard('saida')">
            <h3>Saídas</h3>
            <p class="cor-saida">R$ <span class="valor-dinamico" id="card-saidas" data-valor="0.00">0,00</span></p>
        </div>
        <div class="card" onclick="filtrarPorCard('cartao')">
            <h3>Cartão</h3>
            <p class="cor-cartao">R$ <span class="valor-dinamico" id="card-cartao" data-valor="0.00">0,00</span></p>
        </div>
        <div class="card saldo-total" onclick="filtrarPorCard('todos')">
            <h3>Saldo Atual</h3>
            <p id="card-saldo" class="valor-dinamico" data-valor="0.00" style="color: var(--azul-saldo);">R$ 0,00</p>
            <div class="previsao-texto" id="card-previsao">Sobrará no fim do mês: R$ <span class="valor-dinamico" id="previsao-valor" data-valor="0.00">0,00</span></div>
        </div>
    </div>

    <!-- CAIXA DE TEXTO -->
    <div class="chat-input-area">
        <div id="alerta" class="alerta-temporario">Lançado!</div>
        <input type="text" id="campo-texto" class="chat-input" placeholder="Ex: uber 45 mercado pago" onkeypress="verificarTecla(event)">
        <button class="btn-enviar" onclick="processarComando()">➔</button>
    </div>

    <!-- FILTROS -->
    <div class="filtros-container">
        <select id="filtro-mes" class="filtro-select" onchange="renderizarHistorico()"></select>
        <select id="filtro-tipo" class="filtro-select" onchange="renderizarHistorico()">
            <option value="todos">Todos os Tipos</option>
            <option value="entrada">🟢 Entradas</option>
            <option value="saida">🔴 Saídas</option>
            <option value="cartao">💳 Cartão</option>
        </select>
    </div>

    <!-- LISTA DE GASTOS -->
    <div class="lista-titulo">Histórico de Lançamentos</div>
    <div class="lista-container" id="lista-historico"></div>
</div>

<!-- MODAL DE EDIÇÃO -->
<div class="modal-overlay" id="modal-edicao">
    <div class="modal-container">
        <div class="modal-title">Editar Lançamento</div>
        
        <div class="modal-label">Descrição</div>
        <input type="text" id="modal-desc" class="modal-input">
        
        <div class="modal-label">Valor (R$)</div>
        <input type="number" id="modal-valor" class="modal-input" step="0.01">
        
        <div class="modal-label">Tipo</div>
        <select id="modal-tipo" class="modal-select">
            <option value="entrada">Entrada (+)</option>
            <option value="saida">Saída (-)</option>
            <option value="cartao">Cartão (-)</option>
        </select>

        <div class="modal-label">Conta / Banco</div>
        <input type="text" id="modal-conta" class="modal-input">

        <div class="modal-label">Cartão Utilizado</div>
        <input type="text" id="modal-cartao-id" class="modal-input">
        
        <div class="modal-botoes">
            <button class="btn-modal btn-excluir" onclick="acaoExcluir()">Excluir</button>
            <button class="btn-modal btn-cancelar" onclick="fecharModal()">Voltar</button>
            <button class="btn-modal btn-salvar" onclick="acaoSalvar()">Salvar</button>
        </div>
    </div>
</div>

<script>
    let transacoes = [];
    let idEdicaoAtual = null;
    let saldosOcultos = false;
    const nomesMeses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    
    const BANCOS_CADASTRADOS = {
        "itau": "Itaú", "itaú": "Itaú",
        "bradesco": "Bradesco",
        "santander": "Santander",
        "nubank": "Nubank", "nu": "Nubank",
        "caixa": "Caixa",
        "inter": "Inter",
        "c6": "C6 Bank", "c6bank": "C6 Bank",
        "mercado pago": "Mercado Pago", "mercadopago": "Mercado Pago"
    };

    const CARTOES_CADASTRADOS = {
        "black": "Black",
        "visa": "Visa",
        "master": "Mastercard", "mastercard": "Mastercard",
        "elo": "Elo",
        "amex": "Amex",
        "flash": "Flash"
    };

    function inicializarFiltroMeses() {
        const filtro = document.getElementById('filtro-mes');
        const hoje = new Date();
        let opcoesHTML = '<option value="todos">Todos os Meses</option>';
        for (let i = 0; i < 6; i++) {
            let d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
            opcoesHTML += `<option value="${d.getMonth()}-${d.getFullYear()}">${nomesMeses[d.getMonth()]}/${d.getFullYear()}</option>`;
        }
        filtro.innerHTML = opcoesHTML;
    }

    function alternarTema() {
        const body = document.documentElement;
        const btn = document.getElementById('btn-tema');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = "🌙";
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = "☀️";
        }
    }

    function alternarVisibilidade() {
        saldosOcultos = !saldosOcultos;
        document.getElementById('btn-visibilidade').innerText = saldosOcultos ? "🙈" : "👁️";
        atualizarVisualValores();
    }

    function verificarTecla(e) {
        if (e.key === 'Enter') processarComando();
    }

    // NOVA FUNÇÃO: Filtra o histórico ao clicar nos Cards do topo
    function filtrarPorCard(tipo) {
        const seletorTipo = document.getElementById('filtro-tipo');
        seletorTipo.value = tipo;
        renderizarHistorico();
    }

    function processarComando() {
        const input = document.getElementById('campo-texto');
        const fraseOriginal = input.value.trim();
        if (!fraseOriginal) return;

        const frase = fraseOriginal.toLowerCase();
        const regexNumeros = /\d+([.,]\d+)?/g;
        const numerosEncontrados = frase.match(regexNumeros);

        if (!numerosEncontrados) {
            mostrarAviso("Digite um valor numérico!");
            return;
        }

        let valorTexto = numerosEncontrados[0].replace(',', '.');
        const valor = parseFloat(valorTexto);
        if (isNaN(valor) || valor <= 0) return;

        let contaDetectada = "";
        let cartaoDetectado = "";

        // FORÇAR CADASTRO DA CONTA: Corrigido e validado de forma mais abrangente
        for (let chave in BANCOS_CADASTRADOS) {
            if (frase.includes(chave)) {
                contaDetectada = BANCOS_CADASTRADOS[chave];
                break;
            }
        }

        for (let chave in CARTOES_CADASTRADOS) {
            let regexCartao = new RegExp(`\\b${chave}\\b`, "i");
            if (regexCartao.test(frase)) {
                cartaoDetectado = CARTOES_CADASTRADOS[chave];
                break;
            }
        }

        let tipo = 'saida'; 
        const eEntrada = /\b(recebi|ganhei|salario|salário|entrada)\b/i.test(frase) || frase.includes('+');
        const eCartao = /\b(cartao|cartão|credito|crédito|black|visa|master|mastercard|elo|amex|flash)\b/i.test(frase);
        const eSaidaForcada = /\b(gastei|comprei|paguei|fiz|transferencia|transferência)\b/i.test(frase);

        if (eCartao) {
            tipo = 'cartao';
        } else if (eEntrada) {
            tipo = 'entrada';
        } else if (eSaidaForcada || /\b(pix)\b/i.test(frase)) {
            tipo = 'saida';
        }

        let descricao = fraseOriginal.replace(numerosEncontrados[0], '');
        const termosRemover = /\b(comprei|ganhei|paguei|recebi|gastei|fiz|transferencia|transferência|pix|itau|itaú|bradesco|santander|nubank|nu|caixa|inter|c6|c6bank|mercado pago|mercadopago|conta|no|na|de|com|o|a|cartao|cartão|credito|crédito|black|visa|master|mastercard|elo|amex|flash)\b/gi;
        
        descricao = descricao.replace(termosRemover, '').replace(/\s+/g, ' ').trim(); 
        if (!descricao) descricao = "Lançamento Avulso";

        const dataAtual = new Date();
        const novaTransacao = {
            id: Date.now(),
            descricao: descricao,
            valor: valor,
            tipo: tipo,
            conta: contaDetectada, // Atribui a conta detectada diretamente
            cartao: cartaoDetectado,
            mes: dataAtual.getMonth(),
            ano: dataAtual.getFullYear(),
            dia: dataAtual.getDate()
        };

        transacoes.unshift(novaTransacao);
        atualizarAplicativo();
        input.value = '';
        mostrarAviso(`Adicionado!`);
    }

    function atualizarAplicativo() {
        let totalEntradas = 0, totalSaidas = 0, totalCartao = 0;

        transacoes.forEach(t => {
            if (t.tipo === 'entrada') totalEntradas += t.valor;
            if (t.tipo === 'saida') totalSaidas += t.valor;
            if (t.tipo === 'cartao') totalCartao += t.valor;
        });

        const saldoFinal = totalEntradas - totalSaidas - totalCartao;
        const previsaoSobrar = saldoFinal;

        document.getElementById('card-entradas').setAttribute('data-valor', totalEntradas.toFixed(2));
        document.getElementById('card-saidas').setAttribute('data-valor', totalSaidas.toFixed(2));
        document.getElementById('card-cartao').setAttribute('data-valor', totalCartao.toFixed(2));
        document.getElementById('card-saldo').setAttribute('data-valor', saldoFinal.toFixed(2));
        document.getElementById('previsao-valor').setAttribute('data-valor', previsaoSobrar.toFixed(2));

        const cardSaldo = document.getElementById('card-saldo');
        cardSaldo.style.color = saldoFinal >= 0 ? 'var(--azul-saldo)' : 'var(--saida)';

        atualizarVisualValores();
        renderizarHistorico();
    }

    function atualizarVisualValores() {
        const elementos = document.querySelectorAll('.valor-dinamico');
        elementos.forEach(el => {
            const valorBruto = parseFloat(el.getAttribute('data-valor') || 0);
            if (saldosOcultos) {
                if(el.id === 'card-saldo' || el.id === 'previsao-valor') {
                     el.innerText = " R$ ••••";
                } else {
                     el.innerText = "••••";
                }
            } else {
                const valorFormatado = valorBruto.toFixed(2).replace('.', ',');
                if(el.id === 'card-saldo' || el.id === 'previsao-valor') {
                    el.innerText = `R$ ${valorFormatado}`;
                } else {
                    el.innerText = valorFormatado;
                }
            }
        });
    }

    function renderizarHistorico() {
        const lista = document.getElementById('lista-historico');
        lista.innerHTML = '';
        const filtroMes = document.getElementById('filtro-mes').value;
        const filtroTipo = document.getElementById('filtro-tipo').value;

        transacoes.forEach(t => {
            if (filtroMes !== 'todos') {
                const [m, a] = filtroMes.split('-');
                if (t.mes != m || t.ano != a) return;
            }
            if (filtroTipo !== 'todos' && t.tipo !== filtroTipo) return;

            let tagClasse = 'tag-saida', tipoTexto = 'Saída', corTexto = 'var(--saida)', sinal = '-';
            if (t.tipo === 'entrada') { tagClasse = 'tag-entrada'; tipoTexto = 'Entrada'; corTexto = 'var(--entrada)'; sinal = '+'; }
            if (t.tipo === 'cartao') { tagClasse = 'tag-cartao'; tipoTexto = 'Cartão'; corTexto = 'var(--cartao)'; sinal = '-'; }

            const item = document.createElement('div');
            item.className = 'item-transacao';
            item.onclick = () => abrirModal(t.id);

            let contaHTML = t.conta ? `<span class="tag-conta">${t.conta}</span>` : '';
            let cartaoHTML = t.cartao ? `<span class="tag-cartao-especifico">💳 ${t.cartao}</span>` : '';
            let valorExibição = saldosOcultos ? "•••" : `R$ ${t.valor.toFixed(2).replace('.', ',')}`;

            item.innerHTML = `
                <div class="detalhes-item">
                    <span class="descricao-texto">${t.descricao}</span>
                    <div class="tags-row">
                        <span class="tipo-tag ${tagClasse}">${tipoTexto}</span>
                        ${contaHTML}
                        ${cartaoHTML}
                    </div>
                </div>
                <span style="font-weight: 600; font-size: 1.05rem; color: ${corTexto}">${sinal} ${valorExibição}</span>
            `;
            lista.appendChild(item);
        });
    }

    function abrirModal(id) {
        idEdicaoAtual = id;
        const t = transacoes.find(item => item.id === id);
        document.getElementById('modal-desc').value = t.descricao;
        document.getElementById('modal-valor').value = t.valor;
        document.getElementById('modal-tipo').value = t.tipo;
        document.getElementById('modal-conta').value = t.conta || '';
        document.getElementById('modal-cartao-id').value = t.cartao || '';
        document.getElementById('modal-edicao').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modal-edicao').style.display = 'none';
    }

    function acaoSalvar() {
        const index = transacoes.findIndex(item => item.id === idEdicaoAtual);
        if (index !== -1) {
            transacoes[index].descricao = document.getElementById('modal-desc').value.trim();
            transacoes[index].valor = parseFloat(document.getElementById('modal-valor').value);
            transacoes[index].tipo = document.getElementById('modal-tipo').value;
            transacoes[index].conta = document.getElementById('modal-conta').value.trim();
            transacoes[index].cartao = document.getElementById('modal-cartao-id').value.trim();
        }
        fecharModal();
        atualizarAplicativo();
        mostrarAviso("Salvo!");
    }

    function acaoExcluir() {
        transacoes = transacoes.filter(item => item.id !== idEdicaoAtual);
        fecharModal();
        atualizarAplicativo();
        mostrarAviso("Excluído!");
    }

    function mostrarAviso(texto) {
        const alerta = document.getElementById('alerta');
        alerta.innerText = texto;
        alerta.classList.add('mostrar');
        setTimeout(() => { alerta.classList.remove('mostrar'); }, 3000);
    }

    window.onload = () => {
        inicializarFiltroMeses();
        atualizarAplicativo();
    };
</script>
</body>
</html>
